name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    name: Build & Package (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps ────────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmpv-dev \
            ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (release)
        run: cargo build --release

      - name: Strip binaries
        run: |
          strip target/release/mutui
          strip target/release/mutuid
          strip target/release/mutui-tray

      # ── Derive version from tag ────────────────────────────────────────────
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Tarball ────────────────────────────────────────────────────────────
      - name: Create tarball
        run: |
          TARDIR="mutui-${{ steps.version.outputs.VERSION }}-x86_64-linux"
          mkdir -p "${TARDIR}"
          cp target/release/mutui   "${TARDIR}/"
          cp target/release/mutuid  "${TARDIR}/"
          cp target/release/mutui-tray "${TARDIR}/"
          cp README.md              "${TARDIR}/"
          cp packaging/mutui.desktop "${TARDIR}/"
          tar czf "${TARDIR}.tar.gz" "${TARDIR}"

      # ── Debian package (.deb) ──────────────────────────────────────────────
      - name: Create .deb package
        run: |
          fpm \
            --input-type dir \
            --output-type deb \
            --name mutui \
            --version "${{ steps.version.outputs.VERSION }}" \
            --architecture amd64 \
            --description "Lightweight YouTube Music terminal player" \
            --url "https://github.com/${{ github.repository }}" \
            --license MIT \
            --depends "libmpv1 | libmpv2" \
            --deb-recommends yt-dlp \
            --package "mutui_${{ steps.version.outputs.VERSION }}_amd64.deb" \
            target/release/mutui=/usr/bin/mutui \
            target/release/mutuid=/usr/bin/mutuid \
            target/release/mutui-tray=/usr/bin/mutui-tray \
            packaging/mutui.desktop=/usr/share/applications/mutui.desktop

      # ── RPM package (.rpm) ─────────────────────────────────────────────────
      - name: Create .rpm package
        run: |
          fpm \
            --input-type dir \
            --output-type rpm \
            --name mutui \
            --version "${{ steps.version.outputs.VERSION }}" \
            --architecture x86_64 \
            --description "Lightweight YouTube Music terminal player" \
            --url "https://github.com/${{ github.repository }}" \
            --license MIT \
            --depends "mpv-libs" \
            --rpm-summary "Lightweight YouTube Music terminal player" \
            --rpm-recommends yt-dlp \
            --package "mutui-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm" \
            target/release/mutui=/usr/bin/mutui \
            target/release/mutuid=/usr/bin/mutuid \
            target/release/mutui-tray=/usr/bin/mutui-tray \
            packaging/mutui.desktop=/usr/share/applications/mutui.desktop

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            mutui-*-x86_64-linux.tar.gz
            mutui_*_amd64.deb
            mutui-*.x86_64.rpm
